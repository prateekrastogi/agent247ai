name: Vercel Production Deployment
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: PRODUCTION
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Debug Secrets (Check if)
        run: |
          echo "Checking if Vercel secrets are populated..."
          if [ -z "$VERCEL_TOKEN" ]; then echo "VERCEL_TOKEN is EMPTY"; else echo "VERCEL_TOKEN is set"; fi
          if [ -z "$VERCEL_ORG_ID" ]; then echo "VERCEL_ORG_ID is EMPTY"; else echo "VERCEL_ORG_ID is set"; fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then echo "VERCEL_PROJECT_ID is EMPTY"; else echo "VERCEL_PROJECT_ID is set"; fi
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --debug
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --debug
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --debug
